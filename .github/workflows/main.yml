name: CI/CD Pipeline

# Triggers: run on every push and pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-and-test:
    name:  Build & Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'


      - name: Restore dependencies
        run: dotnet restore TodoApi.sln


      - name: Build solution
        run: dotnet build TodoApi.sln --no-restore --configuration Release


      #    If ANY test fails → this step fails → deploy job is skipped
      - name: Run tests
        run: dotnet test TodoApi.sln --no-build --configuration Release --verbosity normal

  deploy:
    name:  Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test          if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo " Deploy triggered successfully"