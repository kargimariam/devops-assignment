name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore devops/devops.csproj
      - name: Build
        run: dotnet build devops/devops.csproj --no-restore --configuration Release
      - name: Test
        run: dotnet test devops/devops.csproj --no-build --configuration Release
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render
        run: curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
